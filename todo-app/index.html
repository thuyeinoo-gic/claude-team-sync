<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <span class="logo">&#9632; TaskERP</span>
      <span class="nav-sep"></span>
      <span class="breadcrumb">Dashboard &rsaquo; <strong>Task Manager</strong></span>
    </div>
    <div class="navbar-right">
      <span class="nav-user">
        <span class="avatar">T</span>
        Team User
      </span>
    </div>
  </nav>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li class="sidebar-item active">&#9741; &nbsp;Tasks</li>
        <li class="sidebar-item">&#9737; &nbsp;Dashboard</li>
        <li class="sidebar-item">&#9776; &nbsp;Reports</li>
        <li class="sidebar-item">&#9881; &nbsp;Settings</li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main">

      <div class="page-header">
        <div>
          <h1 class="page-title">Task Manager</h1>
          <p class="page-subtitle">Manage and track your team tasks</p>
        </div>
        <button class="btn-primary" id="add-btn">+ New Task</button>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value blue" id="stat-active">0</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-value green" id="stat-done">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" id="search-input" class="search-input" placeholder="Search tasks..." />
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
          </div>
        </div>
        <button class="btn-danger-ghost" id="clear-btn">Clear Completed</button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="data-table" id="data-table">
          <thead>
            <tr>
              <th class="col-cb"></th>
              <th class="col-no">#</th>
              <th>Task</th>
              <th class="col-status">Status</th>
              <th class="col-date">Created</th>
              <th class="col-act">Actions</th>
            </tr>
          </thead>
          <tbody id="todo-tbody"></tbody>
        </table>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">&#9741;</div>
          <p class="empty-title">No tasks found</p>
          <p class="empty-sub">Click "+ New Task" to get started</p>
        </div>
      </div>

      <div class="table-footer">
        <span id="row-count"></span>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="form-label">Task Title <span class="req">*</span></label>
        <input type="text" id="modal-input" class="form-input" placeholder="Enter task description..." maxlength="120" />
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
